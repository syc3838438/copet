<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self';">
  <link rel="stylesheet" href="pet-quick-menu.css">
  <title>CoPets 桌宠场景菜单</title>
</head>
<body>
  <nav class="quick-menu" aria-label="桌宠场景菜单">
    <span class="scene-group" data-group="work">
      <button type="button" class="scene-btn" data-id="scene" data-scene="work">工作</button>
      <button type="button" class="duration-btn" data-id="duration" data-scene="work">25m</button>
    </span>
    <span class="scene-group" data-group="play">
      <button type="button" class="scene-btn" data-id="scene" data-scene="play">娱乐</button>
      <button type="button" class="duration-btn" data-id="duration" data-scene="play">15m</button>
    </span>
    <span class="scene-group" data-group="rest">
      <button type="button" class="scene-btn" data-id="scene" data-scene="rest">休息</button>
      <button type="button" class="duration-btn" data-id="duration" data-scene="rest">5m</button>
    </span>
    <button type="button" data-id="stop" class="stop" disabled>停止</button>
    <button type="button" data-id="settings" class="settings">设置</button>
  </nav>
  <script src="pet-quick-menu-renderer.js"></script>
</body>
</html>
